name: Refresh profile README

# Soul = the README changes because work happened, not because a widget ticked.
# Rebuilds the "Latest" section daily from live releases + blog RSS.
# Injection-safe: uses only github.token + static commands; no event.* inputs.

on:
  schedule:
    - cron: "17 6 * * *" # daily 06:17 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Build README
        run: python3 scripts/build-readme.py
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Commit if changed
        run: |
          if ! git diff --quiet -- README.md; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "chore: refresh profile README [skip ci]"
            git push
          else
            echo "no changes"
          fi
